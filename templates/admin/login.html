<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <div class="auth-wrap">
        <div class="auth-card">
            <h2>🔐 管理员登录</h2>
            <form method="POST" class="auth-form">
                <div class="form-group">
                    <label>管理员账号</label>
                    <input type="text" name="username" required autofocus placeholder="管理员用户名">
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" required placeholder="管理员密码">
                </div>
                <button type="submit" class="btn btn-block">登录后台</button>
            </form>
            <p class="auth-link"><a href="{{ url_for('index') }}">← 返回首页</a></p>
        </div>
    </div>
</body>
</html>
