{% extends 'base.html' %}
{% block title %}登录{% endblock %}
{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <h2>用户登录</h2>
        <form method="POST" class="auth-form">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" required autofocus placeholder="输入用户名">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" required placeholder="输入密码">
            </div>
            <button type="submit" class="btn btn-block">登 录</button>
        </form>
        <p class="auth-link">还没有账号？<a href="{{ url_for('register') }}">注册（需邀请码）</a></p>
    </div>
</div>
{% endblock %}
